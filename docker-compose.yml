services:
  # MySQL storage migrated from NFS to local disk for lower latency, better
  # stability, and reduced data corruption risk. Keep /var/lib/mysql on local
  # disk; use managed MySQL for a future external database migration.
  mysql:
    container_name: cron-mysql
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker-prod/cron-dashboard/.env
    volumes:
      - /var/lib/docker/cron-mysql-data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./backend/db/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    # Backup recommendation: schedule regular mysqldump exports to a separate
    # NFS backup directory, not the live MySQL data directory.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  backend:
    container_name: cron-backend
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker-prod/cron-dashboard/.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      LOG_LEVEL: info
    # Exposed to 0.0.0.0 (all interfaces) for external NGINX LB access.
    # IMPORTANT: Binding to 127.0.0.1 restricts access to localhost only.
    # For multi-VM architecture (Cloudflare -> NGINX LB VM -> App VM),
    # we must bind to 0.0.0.0 to allow the LB VM to reach this service.
    # SECURITY: Use firewall rules to restrict access:
    #   - Allow only NGINX LB VM IP to 3100 (iptables/ufw)
    #   - Deny public internet access (0.0.0.0/0)
    #   - Consider network segmentation (security groups in cloud)
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  frontend:
    container_name: cron-frontend
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker-prod/cron-dashboard/.env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
    # Exposed to 0.0.0.0 (all interfaces) for external NGINX LB access.
    # IMPORTANT: Binding to 127.0.0.1 restricts access to localhost only.
    # For multi-VM architecture (Cloudflare -> NGINX LB VM -> App VM),
    # we must bind to 0.0.0.0 to allow the LB VM to reach this service.
    # SECURITY: Use firewall rules to restrict access:
    #   - Allow only NGINX LB VM IP to 3101 (iptables/ufw)
    #   - Deny public internet access (0.0.0.0/0)
    #   - Consider network segmentation (security groups in cloud)
    ports:
      - "3101:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

networks:
  cron-net:
    driver: bridge
