services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    volumes:
      - /var/lib/docker/cron-mysql-data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3001:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

networks:
  cron-net:
    driver: bridge
