services:
  # MySQL storage migrated from NFS to local disk for lower latency, better
  # stability, and reduced data corruption risk. Keep /var/lib/mysql on local
  # disk; use managed MySQL for a future external database migration.
  mysql:
    container_name: cron-mysql
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    volumes:
      - /var/lib/docker/cron-mysql-data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./backend/db/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    # Backup recommendation: schedule regular mysqldump exports to a separate
    # NFS backup directory, not the live MySQL data directory.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  backend:
    container_name: cron-backend
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      LOG_LEVEL: info
    # Port binding: 0.0.0.0:3100 -> container:3000
    # On single-VM architecture (NGINX + containers on same host),
    # NGINX reverse proxy accesses backend via 127.0.0.1:3100.
    # 0.0.0.0 binding ensures the port is accessible from NGINX
    # on the same machine. NGINX handles all external routing
    # through Cloudflare; containers are not directly exposed
    # to the internet.
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  frontend:
    container_name: cron-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Cron Dashboard}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-}
        NEXT_PUBLIC_GIT_HASH: ${NEXT_PUBLIC_GIT_HASH:-}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-}
        NEXT_PUBLIC_BUILD_TIMESTAMP: ${NEXT_PUBLIC_BUILD_TIMESTAMP:-}
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
    # Port binding: 0.0.0.0:3101 -> container:3000
    # On single-VM architecture (NGINX + containers on same host),
    # NGINX reverse proxy accesses frontend via 127.0.0.1:3101.
    # 0.0.0.0 binding ensures the port is accessible from NGINX
    # on the same machine. NGINX handles all external routing
    # through Cloudflare; containers are not directly exposed
    # to the internet.
    ports:
      - "3101:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

networks:
  cron-net:
    driver: bridge
