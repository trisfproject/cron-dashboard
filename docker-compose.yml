services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - /mnt/nfs/docker/cron-dashboard/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:3000:3000"
    # Enables Cloud SQL Auth Proxy running on the Docker host:
    # set DB_HOST=host.docker.internal and DB_PORT=3306 in the env file.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:3000
      NEXT_PUBLIC_APP_NAME: Cron Dashboard
    ports:
      - "127.0.0.1:3001:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cron-net

networks:
  cron-net:
    driver: bridge
